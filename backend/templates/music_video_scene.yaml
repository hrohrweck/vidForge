name: "Music Video (Scene-Based)"
description: "Create a music video with multi-scene planning, seed image generation, and per-scene video generation"
config:
  workflow_type: scene_based
inputs:
  - name: audio_file
    type: file
    accept: [".mp3", ".wav", ".ogg", ".flac"]
    required: true
    description: "Audio file to create video for"
  - name: style
    type: select
    options: [realistic, anime, manga, cinematic, abstract]
    default: realistic
    required: true
    description: "Visual style for the generated video"
  - name: aspect_ratio
    type: select
    options: ["16:9", "9:16", "1:1"]
    default: "16:9"
    required: false
    description: "Output video aspect ratio"
pipeline:
  - step: extract_lyrics
    description: "Extract lyrics from audio using Whisper"
    tool: whisper
    inputs:
      - audio_file
    outputs:
      - lyrics
  - step: plan_scenes
    description: "Plan scenes using LLM based on lyrics and style"
    model: llm
    inputs:
      - lyrics
      - style
      - aspect_ratio
    outputs:
      - scene_plan
  - step: generate_seed_images
    description: "Generate seed images for each scene"
    inputs:
      - scene_plan
    outputs:
      - seed_images
  - step: generate_scene_videos
    description: "Generate video for each scene"
    inputs:
      - seed_images
      - scene_plan
    outputs:
      - scene_videos
  - step: merge_scenes
    description: "Merge all scene videos into final video"
    tool: ffmpeg
    inputs:
      - scene_videos
    outputs:
      - merged_video
  - step: generate_preview
    description: "Generate low-res preview"
    params:
      width: 854
      height: 480
      fps: 15
    outputs:
      - preview
stages:
  planning:
    - extract_lyrics
    - plan_scenes
  generating_images:
    - generate_seed_images
  generating_videos:
    - generate_scene_videos
  rendering:
    - merge_scenes
    - generate_preview
