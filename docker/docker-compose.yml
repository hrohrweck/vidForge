services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vidforge:vidforge@postgres:5432/vidforge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=FA43D8A573BB213ACD73219030BECD56
      - COMFYUI_URL=http://comfyui:8188
      - OLLAMA_URL=http://ollama:11434
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/app/storage
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ollama:
        condition: service_started

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://vidforge:vidforge@postgres:5432/vidforge
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=FA43D8A573BB213ACD73219030BECD56
      - COMFYUI_URL=http://comfyui:8188
      - OLLAMA_URL=http://ollama:11434
      - STORAGE_BACKEND=local
      - STORAGE_PATH=/app/storage
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      - postgres
      - redis
      - backend
      - ollama

  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    ports:
      - "8188:8188"
    volumes:
      - comfyui-models:/workspace/ComfyUI/models
      - comfyui-output:/workspace/ComfyUI/output
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=12.0.1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8188/system_stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - rocm

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.0.0
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=vidforge
      - POSTGRES_PASSWORD=vidforge
      - POSTGRES_DB=vidforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  vidforge-storage:
  comfyui-models:
  comfyui-output:
  ollama-data:
