services:
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure
    mem_limit: 256m
    cpus: "0.5"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: on-failure
    mem_limit: 256m
    cpus: "0.5"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure
    mem_limit: 2g
    cpus: "1.0"

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker --loglevel=info --beat
    env_file:
      - ../backend/.env
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      - postgres
      - redis
      - backend
      - ollama
    restart: on-failure
    mem_limit: 8g
    cpus: "2.0"
    pids_limit: 512

  audiocraft:
    build:
      context: ./audiocraft
      dockerfile: Dockerfile
    volumes:
      - audiocraft-cache:/app/hf_cache
      - vidforge-storage:/shared-storage
    environment:
      - HF_HOME=/app/hf_cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: on-failure
    mem_limit: 4g
    cpus: "2.0"

  comfyui:
    build:
      context: ./comfyui
      dockerfile: Dockerfile
    volumes:
      - comfyui-models:/workspace/ComfyUI/models
      - vidforge-storage:/shared-storage
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
    security_opt:
      - no-new-privileges:true
    restart: on-failure
    mem_limit: 16g
    cpus: "4.0"
    pids_limit: 512

  ollama:
    image: ollama/ollama:rocm
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_GPU=0
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: on-failure
    mem_limit: 8g
    cpus: "2.0"

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vidforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?required}
      - POSTGRES_DB=${POSTGRES_DB:-vidforge}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure
    mem_limit: 2g
    cpus: "1.0"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?required}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    restart: on-failure
    mem_limit: 512m
    cpus: "0.5"

volumes:
  postgres-data:
  redis-data:
  vidforge-storage:
  ollama-data:
  audiocraft-cache:
  comfyui-models:
