services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ../backend/.env
    environment:
      - COMFYUI_URL=${COMFYUI_URL:-http://localhost:8188}
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: on-failure

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers worker --loglevel=info
    env_file:
      - ../backend/.env
    environment:
      - COMFYUI_URL=${COMFYUI_URL:-http://localhost:8188}
    volumes:
      - ../backend/app:/app/app
      - vidforge-storage:/app/storage
    depends_on:
      - postgres
      - redis
      - backend
    restart: on-failure

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=vidforge
      - POSTGRES_PASSWORD=vidforge
      - POSTGRES_DB=vidforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: on-failure

volumes:
  postgres-data:
  redis-data:
  vidforge-storage: